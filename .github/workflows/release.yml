name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Start Home Assistant
        working-directory: tests/integration
        run: docker compose up -d
      - name: Wait for Home Assistant
        run: bash scripts/wait-for-ha.sh
      - name: Run integration tests
        working-directory: tests/integration
        run: python -m pytest . -v --tb=short --timeout=300
      - name: HA logs on failure
        if: failure()
        working-directory: tests/integration
        run: docker compose logs homeassistant
      - name: Cleanup
        if: always()
        working-directory: tests/integration
        run: docker compose down -v

  release:
    needs: [validate, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Bump version in manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: python scripts/bump-version.py $VERSION

      - name: Commit version bump
        run: bash scripts/commit-version-bump.sh ${{ steps.version.outputs.version }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          bash scripts/extract-changelog.sh $VERSION > release_notes.txt
          if [ ! -s release_notes.txt ]; then
            echo "Release v${VERSION}" > release_notes.txt
          fi
          echo 'notes<<EOF' >> $GITHUB_OUTPUT
          cat release_notes.txt >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Build release zip
        run: |
          if [ ! -d "custom_components/signal_lights" ]; then
            echo "Error: custom_components/signal_lights directory not found"
            exit 1
          fi
          cd custom_components/signal_lights
          zip -r ../../signal_lights.zip . -x "*__pycache__*" "*.pyc"
          if [ ! -f "../../signal_lights.zip" ]; then
            echo "Error: Failed to create signal_lights.zip"
            exit 1
          fi

      - name: Verify release zip exists
        run: |
          if [ ! -f signal_lights.zip ]; then
            echo "ERROR: signal_lights.zip not found — release would be missing the zip asset that HACS requires"
            exit 1
          fi
          echo "signal_lights.zip exists ($(du -h signal_lights.zip | cut -f1))"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          files: signal_lights.zip
